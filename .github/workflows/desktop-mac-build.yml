name: Build Desktop Mac

on:
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: "Also upload to GitHub release tag?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: "Release tag (required if upload_to_release=true), e.g. v3.0.26"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Validate mac signing + notarization secrets for release upload
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        run: |
          test -n "${CSC_LINK}" || (echo "Missing CSC_LINK secret"; exit 1)
          test -n "${CSC_KEY_PASSWORD}" || (echo "Missing CSC_KEY_PASSWORD secret"; exit 1)
          test -n "${APPLE_ID}" || (echo "Missing APPLE_ID secret"; exit 1)
          test -n "${APPLE_APP_SPECIFIC_PASSWORD}" || (echo "Missing APPLE_APP_SPECIFIC_PASSWORD secret"; exit 1)
          test -n "${APPLE_TEAM_ID}" || (echo "Missing APPLE_TEAM_ID secret"; exit 1)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build macOS desktop artifacts
        run: |
          [ -z "${CSC_LINK}" ] && unset CSC_LINK || true
          [ -z "${CSC_KEY_PASSWORD}" ] && unset CSC_KEY_PASSWORD || true
          [ -z "${CSC_NAME}" ] && unset CSC_NAME || true
          [ -z "${APPLE_ID}" ] && unset APPLE_ID || true
          [ -z "${APPLE_APP_SPECIFIC_PASSWORD}" ] && unset APPLE_APP_SPECIFIC_PASSWORD || true
          [ -z "${APPLE_TEAM_ID}" ] && unset APPLE_TEAM_ID || true
          npm run dist:mac
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac-release
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload artifacts to release tag
        if: ${{ github.event.inputs.upload_to_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: |
            desktop/release/*.dmg
            desktop/release/*.zip

      - name: Validate release inputs
        if: ${{ github.event.inputs.upload_to_release == 'true' && github.event.inputs.release_tag == '' }}
        run: |
          echo "upload_to_release=true requires release_tag input."
          exit 1
